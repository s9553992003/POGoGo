<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>POGoGo Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; }
  #map { width: 100vw; height: 100vh; }

  /* Dark context menu */
  .ctx-menu {
    position: absolute; z-index: 9999;
    background: #2d2d44; border: 1px solid #444; border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    overflow: hidden; min-width: 180px;
  }
  .ctx-menu button {
    display: block; width: 100%; padding: 10px 16px;
    background: none; border: none; color: #eee;
    font-size: 13px; text-align: left; cursor: pointer;
  }
  .ctx-menu button:hover { background: #3d3d5e; }
  .ctx-menu hr { border: none; border-top: 1px solid #444; margin: 0; }

  /* Coords tooltip */
  #coords-tip {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.65); color: #ccc; font-size: 11px;
    padding: 3px 10px; border-radius: 4px; pointer-events: none;
    white-space: nowrap; z-index: 1000;
  }

  /* Leaflet dark overrides */
  .leaflet-tile { filter: brightness(0.85) saturate(0.9); }
</style>
</head>
<body>
<div id="map"></div>
<div id="coords-tip">25.047837, 121.531737</div>

<script>
var map = L.map('map', { zoomControl: true, preferCanvas: true });
map.setView([25.047837, 121.531737], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19,
  crossOrigin: true
}).addTo(map);

// Custom red marker icon
var markerIcon = L.divIcon({
  className: '',
  html: '<div style="width:16px;height:16px;background:#e74c3c;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.5);"></div>',
  iconSize: [16,16], iconAnchor: [8,8]
});
var marker = L.marker([25.047837, 121.531737], { icon: markerIcon }).addTo(map);

var coordsTip = document.getElementById('coords-tip');
var ctxMenu = null;
var pendingCtxCoord = null;
var bridge = null;
var userPanned = false;

// Setup QWebChannel
new QWebChannel(qt.webChannelTransport, function(ch) {
  bridge = ch.objects.bridge;
});

// Track mouse move for coords display
map.on('mousemove', function(e) {
  coordsTip.textContent = e.latlng.lat.toFixed(6) + ', ' + e.latlng.lng.toFixed(6);
});

// Left click → teleport
map.on('click', function(e) {
  closeCtxMenu();
  userPanned = true;
  if (bridge) bridge.onMapLeftClick(e.latlng.lat, e.latlng.lng);
});

// Right click → context menu
map.on('contextmenu', function(e) {
  e.originalEvent.preventDefault();
  pendingCtxCoord = { lat: e.latlng.lat, lng: e.latlng.lng };
  showCtxMenu(e.originalEvent.clientX, e.originalEvent.clientY);
});

// Pan detection
map.on('dragstart', function() { userPanned = true; });

document.addEventListener('click', function(e) {
  if (ctxMenu && !ctxMenu.contains(e.target)) closeCtxMenu();
});

function showCtxMenu(x, y) {
  closeCtxMenu();
  ctxMenu = document.createElement('div');
  ctxMenu.className = 'ctx-menu';

  var coord = pendingCtxCoord;
  var lat6 = coord.lat.toFixed(5), lng6 = coord.lng.toFixed(5);

  ctxMenu.innerHTML =
    '<div style="padding:8px 16px;font-size:11px;color:#888;">' + lat6 + ', ' + lng6 + '</div>' +
    '<hr>' +
    '<button id="ctx-walk">Auto Walk Here</button>' +
    '<button id="ctx-teleport">Teleport Here</button>';

  document.body.appendChild(ctxMenu);

  // Position within viewport
  var mw = ctxMenu.offsetWidth, mh = ctxMenu.offsetHeight;
  if (x + mw > window.innerWidth) x = x - mw;
  if (y + mh > window.innerHeight) y = y - mh;
  ctxMenu.style.left = x + 'px';
  ctxMenu.style.top = y + 'px';

  ctxMenu.querySelector('#ctx-walk').addEventListener('click', function() {
    closeCtxMenu();
    if (bridge && pendingCtxCoord) bridge.onMapRightClickWalk(pendingCtxCoord.lat, pendingCtxCoord.lng);
  });
  ctxMenu.querySelector('#ctx-teleport').addEventListener('click', function() {
    closeCtxMenu();
    if (bridge && pendingCtxCoord) bridge.onMapLeftClick(pendingCtxCoord.lat, pendingCtxCoord.lng);
  });
}

function closeCtxMenu() {
  if (ctxMenu) { ctxMenu.remove(); ctxMenu = null; }
}

// ─── Functions called from Python ────────────────────────────────────────────

function updateMarker(lat, lng) {
  marker.setLatLng([lat, lng]);
  coordsTip.textContent = lat.toFixed(6) + ', ' + lng.toFixed(6);
}

function centerMap(lat, lng) {
  if (!userPanned) {
    map.setView([lat, lng], map.getZoom(), { animate: true });
  }
}

function panToMarker(lat, lng) {
  userPanned = false;
  map.setView([lat, lng], map.getZoom(), { animate: true });
}

function searchAndCenter(lat, lng, name) {
  userPanned = false;
  map.setView([lat, lng], 16, { animate: true });
}
</script>
</body>
</html>
